<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Temperature Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    
    <div class="top">
      <h2>Temperature Converter</h2>
      <button onclick="toggleDark()">🌙</button>
    </div>

    <div class="input-group">
      <label>Enter Value</label>
      <input type="number" id="temp" placeholder="Enter temperature" oninput="convert()">
    </div>

    <div class="row">
      <div>
        <label>From</label>
        <select id="from" onchange="convert()">
          <option value="c">Celsius</option>
          <option value="f">Fahrenheit</option>
          <option value="k">Kelvin</option>
        </select>
      </div>

      <button class="swap" onclick="swap()">⇄</button>

      <div>
        <label>To</label>
        <select id="to" onchange="convert()">
          <option value="f">Fahrenheit</option>
          <option value="c">Celsius</option>
          <option value="k">Kelvin</option>
        </select>
      </div>
    </div>

    <div class="result-box">
      <p>Result</p>
      <h3 id="result">--</h3>
    </div>

  </div>

  <script>
    function convert() {
      let temp = parseFloat(document.getElementById("temp").value);
      let from = document.getElementById("from").value;
      let to = document.getElementById("to").value;

      if (isNaN(temp)) {
        document.getElementById("result").innerText = "--";
        return;
      }

      let celsius;
      if (from === "c") celsius = temp;
      else if (from === "f") celsius = (temp - 32) * 5/9;
      else celsius = temp - 273.15;

      let result;
      if (to === "c") result = celsius;
      else if (to === "f") result = (celsius * 9/5) + 32;
      else result = celsius + 273.15;

      document.getElementById("result").innerText =
        result.toFixed(2) + " °" + to.toUpperCase();
    }

    function swap() {
      let from = document.getElementById("from");
      let to = document.getElementById("to");
      let temp = from.value;
      from.value = to.value;
      to.value = temp;
      convert();
    }

    function toggleDark() {
      document.body.classList.toggle("dark");
    }
  </script>

</body>
</html>
